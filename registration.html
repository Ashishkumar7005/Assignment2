<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #a6d2e0;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 600px;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
        }
        h1 {
            text-align: center;
        }
        .labelinput {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .labelinput > label {
            width: 160px;
            min-width: 160px;
            font-weight: 600;
            color: #333;
        }
        .labelinput input[type="text"],
        .labelinput input[type="email"],
        .labelinput input[type="password"],
        .labelinput input[type="tel"],
        .labelinput input[type="date"],
        .labelinput input[type="file"],
        .labelinput select,
        .labelinput textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        .nameclass {
            display: flex;
            gap: 10px;
            flex: 1;
        }
        .nameclass input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        .phone-box {
            display: flex;
            flex: 1;
        }
        .ccode {
            width: 50px;
            text-align: center;
            background: #e9ecef;
            border-radius: 5px 0 0 5px;
            border: 1px solid #ccc;
            color: black;
            padding: 10px 5px;
            font-size: 14px;
        }
        .num {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 0 5px 5px 0;
            font-size: 14px;
        }
        .gender, .department {
            display: flex;
            gap: 15px;
            flex: 1;
            align-items: center;
            margin: 8px 0;
        }
        .btn-wrap {
            display: flex;
            justify-content: center;
        }
        .btn-wrap button {
            width: 100px;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-wrap button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="d-flex justify-content-center align-items-center py-4">
        <div class="container">
            <h1>Student Registration Form</h1>

            <form>

                <div class="labelinput">
                    <label>Roll Number</label>
                    <input type="text" required>
                </div>

                <div class="labelinput">
                    <label>Student Name</label>
                    <div class="nameclass">
                        <input type="text" placeholder="First Name" pattern="[A-Za-z]+" required>
                        <input type="text" placeholder="Last Name" pattern="[A-Za-z]+" required>
                    </div>
                </div>

                <div class="labelinput">
                    <label>Father's Name</label>
                    <input type="text" pattern="[A-Za-z ]+" required>
                </div>

                <div class="labelinput">
                    <label>Date of Birth</label>
                    <input type="date" required>
                </div>

                <div class="labelinput">
                    <label>Mobile Number</label>
                    <div class="phone-box">
                        <input type="number" value="91" readonly class="ccode">
                        <input type="tel" pattern="[0-9]{10}" required class="num" placeholder="10-digit number">
                    </div>
                </div>

                <div class="labelinput">
                    <label>Email Address</label>
                    <input type="email"   pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,4}$"   required>
                </div>

                <div class="labelinput">
                    <label>Password</label>
                    <input type="password"
                        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
                        title="Must include uppercase, lowercase, number, and special character" required>
                </div>

                <div class="labelinput">
                    <label>Gender</label>
                    <div class="gender">
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="gender" required> Male</label>
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="gender"> Female</label>
                    </div>
                </div>

                <div class="labelinput">
                    <label>Department</label>
                    <div class="department">
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="dept" required> CSE</label>
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="dept"> IT</label>
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="dept"> ECE</label>
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="dept"> Civil</label>
                        <label class="fw-normal"><input class="form-check-input me-1" type="radio" name="dept"> Mech</label>
                    </div>
                </div>

                <div class="labelinput">
                    <label>Course</label>
                    <select required>
                        <option value="">Select Course</option>
                        <option>B.Tech</option>
                        <option>BCA</option>
                        <option>MCA</option>
                        <option>M.Tech</option>
                    </select>
                </div>

                <div class="labelinput">
                    <label>Student Photo</label>
                    <input type="file" accept="image/*" required>
                </div>

                <div class="labelinput">
                    <label>City</label>
                    <input type="text" required>
                </div>

                <div class="labelinput">
                    <label>Address</label>
                    <textarea rows="3" required></textarea>
                </div>

                <div class="btn-wrap">
                    <button type="submit">Register</button>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
